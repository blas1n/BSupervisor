name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: bsupervisor_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check bsupervisor/

      - name: Format check
        run: uv run ruff format --check bsupervisor/

      - name: Test
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/bsupervisor_test
        run: uv run pytest tests/ --cov=bsupervisor --cov-fail-under=80 -q

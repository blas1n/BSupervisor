name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint check
        run: uv run ruff check bsupervisor/

      - name: Format check
        run: uv run ruff format --check bsupervisor/

      - name: Run tests with coverage
        run: uv run pytest tests/ --cov=bsupervisor --cov-fail-under=80

# =============================================================================
# BSupervisor Production Docker Compose
# =============================================================================
# FastAPI backend + PostgreSQL
#
# Usage:
#   docker-compose up -d
# =============================================================================

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "3"

services:
  # ===========================================================================
  # Infrastructure
  # ===========================================================================

  postgres:
    logging: *default-logging
    image: postgres:16-alpine
    container_name: bsupervisor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bsupervisor
      POSTGRES_USER: bsupervisor
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "127.0.0.1:5437:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bsupervisor"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - bsupervisor-network

  # ===========================================================================
  # Backend
  # ===========================================================================

  app:
    logging: *default-logging
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: bsupervisor-app
    restart: unless-stopped
    ports:
      - "8500:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://bsupervisor:${POSTGRES_PASSWORD}@postgres:5432/bsupervisor
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    volumes:
      - ../logs:/app/logs
    networks:
      - bsupervisor-network

volumes:
  postgres-data:
    name: bsupervisor-postgres-data

networks:
  bsupervisor-network:
    driver: bridge
    name: bsupervisor-network

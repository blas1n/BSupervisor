services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TZ: ${TZ:-Asia/Seoul}
    user: vscode
    working_dir: /workspace
    volumes:
      - ..:/workspace:cached
      - claude-code-bashhistory:/commandhistory
      - ~/.claude:/home/vscode/.claude:cached
    ports:
      - "${EXTERNAL_BACKEND_PORT:-8500}:8000"
      - "${EXTERNAL_FRONTEND_PORT:-3500}:3000"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - ENVIRONMENT=development
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
      - UV_LINK_MODE=copy
    stdin_open: true
    tty: true
    command: sleep infinity
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bsupervisor-network

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-bsupervisor}
      - POSTGRES_USER=${POSTGRES_USER:-bsupervisor}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-bsupervisor_dev}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${EXTERNAL_PG_PORT:-5437}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - bsupervisor-network

volumes:
  claude-code-bashhistory:
  postgres-data:

networks:
  bsupervisor-network:
    driver: bridge
